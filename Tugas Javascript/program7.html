<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <script>

        let a = 8.3;
        let c = "3.2";
        let b = parseFloat(c);

        console.log(a + "+" + b + "=" + (a + b));
        console.log(a + "-" + b + "=" +(a - b));
        console.log(a + "x" + b + "=" +(a * b));
        console.log(a + "/" + b + "=" +(a / b));
        console.log(parseInt(a) + "%" + parseInt(b) + "=" + (parseInt(a) % parseInt(b)));
    </script>
    
</body>
</html>
