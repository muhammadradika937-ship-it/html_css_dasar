<!DOCTYPE html>
<html>
<head>
    <title>Youtube</title>
    <link rel="stylesheet" href="16b-16d.css">

</head>

<body>

    <div class="videos-grid">
        <div class="video">

            <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" target="_blank">
                <div class="thumbnail-container">
                    <img class="thumbnail" src="../../images CSS/marques-brownlee.png" alt="thumbnail">
                    <div class="timestamp">14:20</div>
                </div>
            </a>

            <div class="video-info">
                <div class="tooltip-container">
                    <a href="https://www.youtube.com" target="_blank">
                        <img class="channel-pic" src="../../images CSS/mrbrownlee.png" alt="channel">
                    </a>
                    <div class="tooltip">
                        <img class="tooltip-pic" src="../../images CSS/mrbrownlee.png" alt="channel">
                        <div class="tooltip-info">
                            <span class="tooltip-name">Marques Brownlee</span>
                            <span class="tooltip-subs">20.9M subscribers</span>
                        </div>
                    </div>
                </div>

                <div class="video-details">
                    <a class="video-title" href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" target="_blank">
                        Talking Tech and AI with Google CEO Sundar Pichai!
                    </a>
                    <div class="channel-name">Marques Brownlee</div>
                    <div class="video-stats">3.4M views . 6 months ago</div>
                </div>

            </div>
        </div>
        

        <div class="video">
            <a href="https://www,youtube.com" target="_blank">
                <div class="thumbnail-container">
                    <img class="thumbnail" src="../../images CSS/Markiplier2.png" alt="thumbnail">
                    <div class="timestamp">8:22</div>
                </div>
            </a>

            <div class="video-info">
                <div class="tooltip-container">
                    <a href="https://www,youtube.com" target="_blank">
                        <img class="tooltip-pic" src="../../images CSS/Markiplier.jpg">
                    </a>
                    <div class="tooltip">
                        <img class="tooltip-pic" src="../../images CSS/Markiplier.jpg">
                        <div class="tooltip-info">
                            <span class="tooltip-name">Markiplier</span>
                            <span class="tooltip-subs">30M subscribers</span>
                        </div>
                    </div>
                </div>

                <div class="video-details">
                    <a class="video-title" href="https://youtu.be/mP0RAo9SKZk?si=YytOCEHJ9d0L3Uxa" target="_blank">
                        Try Not To laugh Challenge #9
                    </a>
                    <div class="channel-name">Markiplier</div>
                    <div class="video-stats">19M views . 4 years ago</div>
                </div>
            </div>
        </div>

    </div>
    
</body>
</html>
