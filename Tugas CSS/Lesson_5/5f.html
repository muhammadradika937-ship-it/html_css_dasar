<!DOCTYPE html>
<html>
    <head>
        <title>Stock Price</title>

        <style>

            body{
                font-family: Arial;
            }

           

            .price{
                font-size:40px;
                font-weight: bold;
            }

            .usd{
                font-size: 20px;
                color:gray;
            }

            .up{
                color:green;
                margin-top: 10px;
            }

            .after{
                margin-top: 10px;
                color:gray;
            }

            .down{
                color:red;
            }
        </style>

    </head>

    <body>
        <p class="card">

            <p class="price">
                1,049.61 <span class="usd">USD</span>
            </p>

            <p class="up">
                +18.05 (1.75%) today
            </p>

            <p class="after">
                After hours 1,048.00
                <span class="down">-1,61 (0.15%)</span>
            </p>

        </p>

    </body>

</html>
