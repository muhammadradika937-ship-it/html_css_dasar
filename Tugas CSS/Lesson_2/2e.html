<!DOCTYPE html>
<html>
    <head>

        <style>


            .apply-button {
                background-color: rgb(10,102,194);
                color: white;
                border: none;
                height: 36px;
                width: 200px;
                border-radius: 18px;
                font-weight: bold;
                cursor: pointer;
            }

            .save {
                background-color: white;
                color: rgb(10,102,194);
                border: 1px solid rgb(10,102,194);
                height: 36px;
                width: 80px;
                border-radius: 18px;
                font-weight: bold;
                cursor: pointer;
            }
        </style>

    </head>

<body>

    <button class="apply-button">
        Apply on company website
    </button>

    <button class="save">
        save
    </button>

</body>
</html>
