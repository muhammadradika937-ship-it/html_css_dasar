<!DOCTYPE html>
<html>
    <head>
        <style>

            .get-started{
                background-color: rgb(121,82,179);
                color: white;
                border: none;
                height: 36px;
                width: 110px;
                border-radius: 4px;
                cursor: pointer;
            }

            .download{
                background-color: white;
                color: rgb(108,117,125);
                border: 1px solid rgb(108,117,125);
                height: 36px;
                width: 100px;
                border-radius: 4px;
                cursor: pointer;
            }

        </style>
    </head>

    <body>
        <button class="get-started">
            Get started
        </button>

        <button class="download">
            Download
        </button>

    </body>
</html>
