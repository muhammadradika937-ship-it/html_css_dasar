<!DOCTYPE html>
<html>
    <head>

        <style>

            .link{
                color: rgb(0,113,133);
            }

            .price{
                color:rgb(0,118,0);
                font-weight: bold;
            }

            .cart{
                background-color: rgb(225,216,20);
                border: none;
                height: 36px;
                width: 120px;
                border-radius: 18px;
                cursor: pointer;
            }

            .buy{
                background-color: rgb(255,164,28);
                border: none;
                height: 36px;
                width: 120px;
                border-radius: 18px;
                cursor: pointer;
            }
        </style>

    </head>

    <body>

        <a class="link" href="https://www.amazon.com">
            Back to Amazon
        </a>

        <h2>nike Black Running Shoes</h2>

        <p class="price">$39 - in stock.</p>

        <p>Free delivery tomorrow.</p>

        <button class="cart">
            Add to cart
        </button>

        <button class="buy">
            Buy now
        </button>
        
    </body>
</html>
